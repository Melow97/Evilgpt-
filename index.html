
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WormGPT ChatBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style id="custom-fonts-style"></style>
    <style>
      :root {
        --color-bg-primary: #131314;
        --color-panel: #1C1C1E;
        --color-text-primary: #e5e7eb;
        --color-text-secondary: #9ca3af;
        --color-accent-primary: #F87171;
        --color-accent-secondary: #DC2626;
        --color-bubble-user: #450a0a;
        --color-bubble-model: #222226;
        --color-border: #374151;
        --color-scrollbar-thumb: #333;
        --color-scrollbar-track: #1a1a1a;
        --bg-image-url: none;
      }
      body {
        font-family: 'Roboto', sans-serif;
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
        background-image: var(--bg-image-url);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      .brand-gradient {
        background: linear-gradient(to right, var(--color-accent-primary), var(--color-accent-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      .animate-scanline {
        animation: scanline 4s linear infinite;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--color-scrollbar-track); }
      ::-webkit-scrollbar-thumb {
        background-color: var(--color-scrollbar-thumb);
        border-radius: 4px;
        border: 2px solid var(--color-scrollbar-track);
      }
    </style>

  }
}
</script>
